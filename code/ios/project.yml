name: StoryForce
options:
  bundleIdPrefix: ai.storyforce
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  StoryForce:
    type: application
    platform: iOS
    sources:
      - path: StoryForce
    info:
      path: StoryForce/Info.plist
      properties:
        CFBundleDisplayName: StoryForce
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSMicrophoneUsageDescription: "StoryForce uses the microphone to record and coach your sales-story delivery."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.storyforce.app
        GENERATE_INFOPLIST_FILE: NO
